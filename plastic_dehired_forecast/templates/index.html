<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pallets Forecasting</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
<div class="container">
  <div class="form-box">

    <h2>Pallets Forecasting</h2>

    <form action="/predict" method="post">

      <label>Customer</label>
      <select name="customer" required>
        {% for i in range(10) %}
          <option value="{{ i }}">Customer {{ i }}</option>
        {% endfor %}
      </select>

      <label>Year</label>
      <select name="year">
        {% for y in range(2022, 2026) %}
          <option value="{{ y }}">{{ y }}</option>
        {% endfor %}
      </select>

      <label>Month</label>
      <select name="month">
        {% for m in range(1,13) %}
          <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>

      <label>Day</label>
      <select name="day">
        {% for d in range(1,32) %}
          <option value="{{ d }}">{{ d }}</option>
        {% endfor %}
      </select>

      <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
      <p class="result">{{ prediction_text }}</p>
    {% endif %}

  </div>
</div>
</body>
</html>
